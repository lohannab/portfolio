<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato — Lohanna B</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav id="nav" class="scrolled">
        <a href="index.html" class="nav-logo">Lohanna B.</a>
        <ul class="nav-links">
            <li><a href="index.html#sobre">Sobre</a></li>
            <li><a href="index.html#projetos">Projetos</a></li>
            <li><a href="index.html#contato">Contato</a></li>
        </ul>
    </nav>

    <div class="contact-page">

        <div class="contact-page-left">
            <span class="section-tag" style="margin-bottom: 20px;">Mensagem</span>
            <h1>Vamos<br>conversar?</h1>
            <p style="margin-top: 20px;">
                Me envie uma mensagem e responderei o mais rápido possível. Estou aberta a oportunidades, freelas e colaborações.
            </p>
        </div>

        <div class="contact-page-right">
            <form class="contact-form" onsubmit="handleSubmit(event)">

                <div class="form-group">
                    <label for="name">Seu nome</label>
                    <input type="text" id="name" name="name" placeholder="Como devo te chamar?" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Assunto</label>
                    <input type="text" id="subject" name="subject" placeholder="Sobre o que é?">
                </div>

                <div class="form-group">
                    <label for="message">Mensagem</label>
                    <textarea id="message" name="message" rows="6" placeholder="Escreva aqui sua mensagem..." required></textarea>
                </div>

                <button type="submit" id="submit-btn">Enviar mensagem</button>

            </form>
        </div>

    </div>

    <script>
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            nav.classList.add('scrolled');
        });

        function handleSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.textContent = 'Mensagem enviada';
            btn.style.background = '#2ebf91';
            btn.disabled = true;
        }
    </script>

</body>
</html>
